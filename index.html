<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Italian Time Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:opsz,wght@9..40,300..700&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0c;
      --fg: #e5e0d8;
      --fg-dim: #a39e94;
      --accent: #c8956c;
      --accent-soft: rgba(200,149,108,.12);
      --card: #171614;
      --card-border: #2a2722;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
      min-height: 100dvh; padding: 1.5rem 1rem 2.5rem;
      text-align: center; overflow-x: hidden;
    }
    header { margin-bottom: 1.25rem; }
    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.75rem; font-weight: 400;
      letter-spacing: .01em; margin-bottom: .2rem;
    }
    .hint { color: var(--fg-dim); font-size: .78rem; line-height: 1.4; }
    .hint b { color: var(--accent); font-weight: 500; }
    .hint-desktop { display: none; }
    @media(min-width:600px){ .hint-mobile{display:none} .hint-desktop{display:inline} }

    #clockWrap { display:flex; flex-direction:column; align-items:center; }
    canvas#clockCanvas { width: min(82vw, 340px); height: min(82vw, 340px); }

    #answerBlock {
      min-height:5.5rem; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:.15rem; margin:.25rem 0;
    }
    #phrase {
      font-family:'Instrument Serif',Georgia,serif;
      font-size:clamp(1.25rem,1rem+1.2vw,1.65rem);
      line-height:1.35; color:var(--fg);
      opacity:0; transform:translateY(4px);
      transition:opacity .25s ease, transform .25s ease;
    }
    #phrase.show { opacity:1; transform:translateY(0); }
    #formal {
      font-family:'JetBrains Mono',monospace;
      font-size:1.15rem; font-weight:500; letter-spacing:.04em;
      color:var(--accent); opacity:0; transition:opacity .25s ease .06s;
    }
    #formal.show { opacity:1; }
    #timer {
      font-family:'JetBrains Mono',monospace; font-size:.95rem;
      color:var(--fg-dim); transition:color .15s; margin-top:.1rem;
    }
    #timer.fast { color:var(--accent); }

    #tapBtn {
      display:flex; align-items:center; justify-content:center; gap:.45rem;
      width:100%; max-width:300px; margin:.75rem auto; padding:.8rem 1rem;
      font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:500;
      color:var(--bg); background:var(--accent); border:none; border-radius:12px;
      cursor:pointer; -webkit-user-select:none; user-select:none;
      transition:transform .08s,opacity .08s;
    }
    #tapBtn:active { transform:scale(.97); opacity:.85; }
    #tapBtn svg { width:16px; height:16px; flex-shrink:0; }

    #controls {
      display:flex; flex-wrap:wrap; gap:.35rem; justify-content:center;
      margin:.35rem auto .75rem; max-width:440px;
    }
    .btn {
      font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:500;
      padding:.4rem .65rem; border-radius:10px; border:1px solid var(--card-border);
      background:var(--card); color:var(--fg-dim); cursor:pointer;
      transition:all .15s; -webkit-user-select:none; user-select:none;
    }
    .btn:active { transform:translateY(1px); }
    .btn.active { background:var(--accent-soft); color:var(--accent); border-color:rgba(200,149,108,.3); }
    .btn.ghost { border-color:transparent; background:transparent; }

    .stats-bar {
      display:flex; justify-content:center; gap:1.25rem; flex-wrap:wrap;
      background:var(--card); border:1px solid var(--card-border);
      border-radius:var(--radius); padding:.6rem 1rem; max-width:440px; margin:0 auto;
    }
    .stat-item { display:flex; flex-direction:column; align-items:center; gap:.05rem; }
    .stat-val { font-family:'JetBrains Mono',monospace; font-size:.85rem; font-weight:500; color:var(--fg); }
    .stat-label { font-size:.65rem; color:var(--fg-dim); text-transform:uppercase; letter-spacing:.06em; }
    .divider { width:40px; height:1px; background:var(--card-border); margin:1rem auto; }
  </style>
</head>
<body>
  <header>
    <h1>Che ora è?</h1>
    <p class="hint">
      <span class="hint-mobile">Tap to reveal, tap again for next</span>
      <span class="hint-desktop"><b>Space</b> reveal / next · <b>Enter</b> advance</span>
    </p>
  </header>

  <div id="clockWrap">
    <canvas id="clockCanvas" width="680" height="680"></canvas>
  </div>

  <div id="answerBlock">
    <div id="phrase">—</div>
    <div id="formal">—</div>
    <div id="timer">0.000 s</div>
  </div>

  <button id="tapBtn" onclick="handleTap()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    <span id="tapLabel">Cominciamo</span>
  </button>

  <div id="controls">
    <button class="btn active" id="step5" onclick="setStep(5)">5‑min</button>
    <button class="btn" id="step1" onclick="setStep(1)">1‑min</button>
    <button class="btn active" id="meno35" onclick="toggleMeno()">meno ≥ 35</button>
    <button class="btn ghost" onclick="clearStats()">Azzera</button>
    <button class="btn ghost" onclick="downloadCSV()">CSV ↓</button>
  </div>

  <div class="divider"></div>

  <div class="stats-bar">
    <div class="stat-item"><span class="stat-val" id="count">0</span><span class="stat-label">Trials</span></div>
    <div class="stat-item"><span class="stat-val" id="avg">—</span><span class="stat-label">Avg</span></div>
    <div class="stat-item"><span class="stat-val" id="best">—</span><span class="stat-label">Best</span></div>
    <div class="stat-item"><span class="stat-val" id="p95">—</span><span class="stat-label">P95</span></div>
  </div>

<script>
const clock = document.getElementById('clockCanvas');
let fontsReady = false;

// Wait for Nunito to load before first draw
document.fonts.ready.then(() => { fontsReady = true; drawClock(hour, minute); });

function fixCanvas(cv) {
  const dpr = window.devicePixelRatio || 1;
  const rect = cv.getBoundingClientRect();
  const nW = Math.round(rect.width * dpr);
  const nH = Math.round(rect.height * dpr);
  if (cv.width !== nW || cv.height !== nH) { cv.width = nW; cv.height = nH; }
  const g = cv.getContext('2d');
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
  return g;
}

/* ── Colors ── */
const DIAL    = '#0a0a0a';
const STEEL_L = '#b0b0ad';
const STEEL   = '#8a8a88';
const STEEL_D = '#5a5a58';
const EDGE    = '#3a3a38';
const LUME    = '#e8dcc8';
const DIAL_WHITE = '#d4d0c8';

/* ── Cushion path ── */
function cushionPath(g, cx, cy, r) {
  const k = r * 0.72;
  g.beginPath();
  g.moveTo(cx, cy - r);
  g.bezierCurveTo(cx+k, cy-r, cx+r, cy-k, cx+r, cy);
  g.bezierCurveTo(cx+r, cy+k, cx+k, cy+r, cx, cy+r);
  g.bezierCurveTo(cx-k, cy+r, cx-r, cy+k, cx-r, cy);
  g.bezierCurveTo(cx-r, cy-k, cx-k, cy-r, cx, cy-r);
  g.closePath();
}

function drawClock(h, m) {
  const g = fixCanvas(clock);
  const w = clock.clientWidth, ht = clock.clientHeight;
  const cx = w/2, cy = ht/2;
  const outerR = Math.min(w,ht)/2 - 4;
  const dialR = outerR * 0.82;

  g.clearRect(0, 0, w, ht);

  /* ── Crown guard + crown ── */
  const crCx = cx + outerR*0.97, crCy = cy;
  const crW = outerR*0.12, crH = outerR*0.16;

  g.fillStyle = STEEL;
  g.beginPath();
  g.moveTo(cx+outerR*0.78, crCy - crH*2.0);
  g.quadraticCurveTo(cx+outerR*0.92, crCy-crH*1.6, crCx+crW*0.2, crCy-crH*0.85);
  g.lineTo(crCx+crW*0.2, crCy+crH*0.85);
  g.quadraticCurveTo(cx+outerR*0.92, crCy+crH*1.6, cx+outerR*0.78, crCy+crH*2.0);
  g.closePath(); g.fill();
  g.strokeStyle = EDGE; g.lineWidth = 1; g.stroke();

  // crown body
  const cbX = crCx-crW*0.15, cbY = crCy-crH*0.65, cbW = crW, cbH = crH*1.3;
  g.fillStyle = STEEL_L;
  g.beginPath(); g.roundRect(cbX, cbY, cbW, cbH, 2); g.fill();
  g.strokeStyle = STEEL_D; g.lineWidth = 0.7; g.stroke();
  // knurling
  g.strokeStyle = 'rgba(0,0,0,.22)'; g.lineWidth = 0.5;
  for (let i=0; i<6; i++) {
    const ly = cbY+2+(cbH-4)*(i/5);
    g.beginPath(); g.moveTo(cbX+1,ly); g.lineTo(cbX+cbW-1,ly); g.stroke();
  }
  // lever nub
  g.fillStyle = STEEL;
  g.beginPath(); g.arc(cx+outerR*0.85, crCy-crH*1.8, crW*0.35, Math.PI, 0); g.fill();
  g.strokeStyle = EDGE; g.lineWidth = 0.7; g.stroke();

  /* ── Case ── */
  cushionPath(g, cx, cy, outerR);
  const bGrad = g.createRadialGradient(cx-outerR*.3, cy-outerR*.3, 0, cx, cy, outerR);
  bGrad.addColorStop(0, STEEL_L); bGrad.addColorStop(0.5, STEEL); bGrad.addColorStop(1, STEEL_D);
  g.fillStyle = bGrad; g.fill();
  cushionPath(g, cx, cy, outerR);
  g.strokeStyle = EDGE; g.lineWidth = 1.5; g.stroke();

  // inner ring
  cushionPath(g, cx, cy, outerR*0.91);
  const iGrad = g.createRadialGradient(cx, cy-outerR*.2, 0, cx, cy, outerR*.91);
  iGrad.addColorStop(0, '#7a7a78'); iGrad.addColorStop(1, STEEL_D);
  g.fillStyle = iGrad; g.fill();
  cushionPath(g, cx, cy, outerR*0.91);
  g.strokeStyle = 'rgba(0,0,0,.3)'; g.lineWidth = 0.5; g.stroke();

  /* ── Dial ── */
  g.save();
  g.beginPath(); g.arc(cx, cy, dialR, 0, Math.PI*2); g.clip();
  g.fillStyle = DIAL; g.fillRect(0,0,w,ht);

  // depth gradient
  const dGrad = g.createRadialGradient(cx, cy, 0, cx, cy, dialR);
  dGrad.addColorStop(0, 'rgba(25,23,20,.25)'); dGrad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = dGrad; g.fillRect(0,0,w,ht);

  /* ── Minute dots ── */
  const trackR = dialR * 0.94;
  for (let i=0; i<60; i++) {
    if (i%5===0) continue;
    const a = (Math.PI*2)*(i/60) - Math.PI/2;
    g.fillStyle = 'rgba(232,220,200,.15)';
    g.beginPath(); g.arc(cx+trackR*Math.cos(a), cy+trackR*Math.sin(a), 0.7, 0, Math.PI*2); g.fill();
  }

  /* ── LUMINOR text (upper dial) ── */
  g.save();
  g.fillStyle = DIAL_WHITE;
  g.shadowColor = 'rgba(212,208,200,.06)'; g.shadowBlur = 2;
  const luminorSize = dialR * 0.075;
  g.font = `600 ${luminorSize}px 'DM Sans', system-ui, sans-serif`;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.letterSpacing = `${dialR * 0.025}px`;
  g.fillText('LUMINOR', cx, cy - dialR*0.42);
  g.restore();

  /* ── PANERAI text (lower dial) ── */
  g.save();
  g.fillStyle = DIAL_WHITE;
  g.shadowColor = 'rgba(212,208,200,.06)'; g.shadowBlur = 2;
  const paneraiSize = dialR * 0.075;
  g.font = `600 ${paneraiSize}px 'DM Sans', system-ui, sans-serif`;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.letterSpacing = `${dialR * 0.025}px`;
  g.fillText('PANERAI', cx, cy + dialR*0.30);
  g.restore();

  /* ── OP logo (small, between PANERAI and 6) ── */
  g.save();
  g.fillStyle = DIAL_WHITE;
  const logoSize = dialR * 0.045;
  g.font = `700 ${logoSize}px 'DM Sans', system-ui, sans-serif`;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.fillText('OP', cx, cy + dialR*0.40);
  // tiny box around OP
  const opW = g.measureText('OP').width + 4;
  const opH = logoSize + 2;
  g.strokeStyle = DIAL_WHITE; g.lineWidth = 0.6;
  g.strokeRect(cx - opW/2, cy + dialR*0.40 - opH/2, opW, opH);
  g.restore();

  /* ── Swiss Made (bottom) ── */
  g.save();
  g.fillStyle = 'rgba(212,208,200,.4)';
  const swissSize = dialR * 0.032;
  g.font = `400 ${swissSize}px 'DM Sans', system-ui, sans-serif`;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.letterSpacing = `${dialR * 0.012}px`;
  g.fillText('SWISS  MADE', cx, cy + dialR*0.82);
  g.restore();

  /* ── Indices ── */
  const idxOuter = dialR * 0.90;
  const idxInner = dialR * 0.76;
  const numDist  = dialR * 0.70;

  for (let i=0; i<12; i++) {
    const ang = (Math.PI*2)*(i/12) - Math.PI/2;
    const num = i===0 ? 12 : i;

    if (num===12 || num===3 || num===6 || num===9) {
      g.save();
      g.fillStyle = LUME;
      g.shadowColor = 'rgba(232,220,200,.10)'; g.shadowBlur = 4;
      const fs = dialR * 0.22;
      g.font = `900 ${fs}px 'Nunito', system-ui, sans-serif`;
      g.textAlign = 'center'; g.textBaseline = 'middle';
      const tx = cx + numDist * Math.cos(ang);
      const ty = cy + numDist * Math.sin(ang);
      g.fillText(String(num), tx, ty);
      g.restore();
    } else {
      // stick index
      g.save();
      g.strokeStyle = LUME;
      g.shadowColor = 'rgba(232,220,200,.08)'; g.shadowBlur = 3;
      g.lineWidth = dialR * 0.022;
      g.lineCap = 'round';
      g.beginPath();
      g.moveTo(cx+idxInner*Math.cos(ang), cy+idxInner*Math.sin(ang));
      g.lineTo(cx+idxOuter*Math.cos(ang), cy+idxOuter*Math.sin(ang));
      g.stroke();
      g.restore();
    }
  }

  /* ── Hands ── */
  const hAng = ((h%12)+m/60)*(Math.PI/6) - Math.PI/2;
  drawHand(g, cx, cy, hAng, dialR*0.46, dialR*0.055, dialR*0.025);

  const mAng = m*(Math.PI/30) - Math.PI/2;
  drawHand(g, cx, cy, mAng, dialR*0.72, dialR*0.04, dialR*0.018);

  // center
  g.shadowColor = 'transparent'; g.shadowBlur = 0;
  g.fillStyle = '#333';
  g.beginPath(); g.arc(cx, cy, dialR*0.035, 0, Math.PI*2); g.fill();
  g.fillStyle = LUME;
  g.beginPath(); g.arc(cx, cy, dialR*0.018, 0, Math.PI*2); g.fill();

  g.restore(); // unclip

  // crystal rim
  g.beginPath(); g.arc(cx, cy, dialR, 0, Math.PI*2);
  g.strokeStyle = 'rgba(255,255,255,.06)'; g.lineWidth = 1.5; g.stroke();
}

function drawHand(g, cx, cy, angle, length, baseW, tipW) {
  g.save();
  g.translate(cx, cy);
  g.rotate(angle + Math.PI/2);
  const mid = length * 0.38;

  g.beginPath();
  g.moveTo(-baseW/2, 4);
  g.lineTo(-baseW*0.6, -mid);
  g.lineTo(-tipW/2, -length);
  g.lineTo(tipW/2, -length);
  g.lineTo(baseW*0.6, -mid);
  g.lineTo(baseW/2, 4);
  g.closePath();

  g.fillStyle = LUME;
  g.shadowColor = 'rgba(232,220,200,.08)'; g.shadowBlur = 4;
  g.fill();

  g.shadowBlur = 0;
  g.strokeStyle = 'rgba(0,0,0,.35)'; g.lineWidth = 0.6;
  g.stroke();

  // spine
  g.strokeStyle = 'rgba(80,75,65,.3)'; g.lineWidth = 0.5;
  g.beginPath(); g.moveTo(0, 2); g.lineTo(0, -length+2); g.stroke();
  g.restore();
}

window.addEventListener('resize', () => drawClock(hour, minute));

/* ── Time phrases ── */
const numbers = [
  "zero","uno","due","tre","quattro","cinque","sei","sette","otto","nove","dieci",
  "undici","dodici","tredici","quattordici","quindici","sedici","diciassette","diciotto","diciannove",
  "venti","ventuno","ventidue","ventitré","ventiquattro","venticinque","ventisei","ventisette","ventotto","ventinove",
  "trenta","trentuno","trentadue","trentatré","trentaquattro","trentacinque","trentasei","trentasette","trentotto","trentanove",
  "quaranta","quarantuno","quarantadue","quarantatré","quarantaquattro","quarantacinque","quarantasei","quarantasette","quarantotto","quarantanove",
  "cinquanta","cinquantuno","cinquantadue","cinquantatré","cinquantaquattro","cinquantacinque","cinquantasei","cinquantasette","cinquantotto","cinquantanove"
];
function numberToWords(n) { return numbers[n]; }
function hourWord(h) {
  const h12 = h%12||12;
  return h12===1 ? "l'una" : `le ${numberToWords(h12)}`;
}
function getTimePhrase(h, m) {
  const h12 = h%12||12;
  const nextH = (h12%12)+1;
  const useE = h12===1?"È":"Sono";
  const useENext = nextH===1?"È":"Sono";
  const formal = `${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  if(h===0&&m===0) return {phrase:"È mezzanotte",formal};
  if(h===12&&m===0) return {phrase:"È mezzogiorno",formal};
  if(m===0) return {phrase:`${useE} ${hourWord(h)} in punto`,formal};
  if(m===15) return {phrase:`${useE} ${hourWord(h)} e un quarto`,formal};
  if(m===30) return {phrase:`${useE} ${hourWord(h)} e mezza`,formal};
  if(menoFrom35 && m>=35) {
    const to=60-m;
    const nW=nextH===1?"l'una":`le ${numberToWords(nextH)}`;
    if(to===15) return {phrase:`${useENext} ${nW} meno un quarto`,formal};
    return {phrase:`${useENext} ${nW} meno ${numberToWords(to)}`,formal};
  }
  return {phrase:`${useE} ${hourWord(h)} e ${numberToWords(m)}`,formal};
}

/* ── State ── */
const phraseEl=document.getElementById('phrase');
const formalEl=document.getElementById('formal');
const timerEl=document.getElementById('timer');
const tapLabel=document.getElementById('tapLabel');

let hour=0, minute=0, startTime=null;
let running=false, revealed=false;
let minuteStep=5, menoFrom35=true;

function setStep(s){
  minuteStep=s;
  document.getElementById('step5').classList.toggle('active',s===5);
  document.getElementById('step1').classList.toggle('active',s===1);
}
function toggleMeno(){
  menoFrom35=!menoFrom35;
  document.getElementById('meno35').classList.toggle('active',menoFrom35);
}

function showNewClock(){
  hour=Math.floor(Math.random()*12);
  minute=minuteStep===5?Math.floor(Math.random()*12)*5:Math.floor(Math.random()*60);
  drawClock(hour,minute);
  const{phrase,formal}=getTimePhrase(hour,minute);
  phraseEl.textContent=phrase; formalEl.textContent=formal;
  phraseEl.classList.remove('show'); formalEl.classList.remove('show');
  timerEl.textContent='0.000 s'; timerEl.classList.remove('fast');
  startTime=performance.now(); running=true; revealed=false;
  tapLabel.textContent='Rivela';
}

function revealAnswer(){
  const elapsed=(performance.now()-startTime)/1000;
  timerEl.textContent=`${elapsed.toFixed(3)} s`;
  timerEl.classList.add('fast');
  phraseEl.classList.add('show'); formalEl.classList.add('show');
  revealed=true; recordTrial(elapsed);
  tapLabel.textContent='Avanti';
}

function handleTap(){
  if(!running){showNewClock();return;}
  if(!revealed) revealAnswer(); else showNewClock();
}

document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'){e.preventDefault();handleTap();}
  else if(e.code==='Enter'&&revealed) showNewClock();
});

/* ── Stats ── */
const times=[];
const avgEl=document.getElementById('avg');
const countEl=document.getElementById('count');
const bestEl=document.getElementById('best');
const p95El=document.getElementById('p95');

function recordTrial(s){if(isFinite(s)&&s>0){times.push(s);updateStats();}}
function clearStats(){times.length=0;updateStats();}
function downloadCSV(){
  if(!times.length){alert('Nessun dato.');return;}
  const rows=['trial,time_s'];
  times.forEach((t,i)=>rows.push(`${i+1},${t.toFixed(3)}`));
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='time_trainer.csv';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
function updateStats(){
  const n=times.length; countEl.textContent=n;
  if(!n){avgEl.textContent='—';bestEl.textContent='—';p95El.textContent='—';return;}
  const sum=times.reduce((a,b)=>a+b,0);
  avgEl.textContent=(sum/n).toFixed(2)+'s';
  bestEl.textContent=Math.min(...times).toFixed(2)+'s';
  const sorted=[...times].sort((a,b)=>a-b);
  const idx=Math.max(0,Math.min(n-1,Math.ceil(0.95*n)-1));
  p95El.textContent=sorted[idx].toFixed(2)+'s';
}

window.addEventListener('load', () => drawClock(0, 0));
</script>
</body>
</html>
