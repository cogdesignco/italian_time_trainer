<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Italian Time Trainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:opsz,wght@9..40,300..700&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0c;
      --fg: #e5e0d8;
      --fg-dim: #a39e94;
      --accent: #c8956c;
      --accent-soft: rgba(200,149,108,.12);
      --card: #171614;
      --card-border: #2a2722;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
      min-height: 100dvh; padding: 1.5rem 1rem 2.5rem;
      text-align: center; overflow-x: hidden;
    }
    header { margin-bottom: 1.25rem; }
    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.75rem; font-weight: 400;
      letter-spacing: .01em; margin-bottom: .2rem;
    }
    .hint { color: var(--fg-dim); font-size: .78rem; line-height: 1.4; }
    .hint b { color: var(--accent); font-weight: 500; }
    .hint-desktop { display: none; }
    @media(min-width:600px){ .hint-mobile{display:none} .hint-desktop{display:inline} }

    /* Clock */
    #clockWrap { display:flex; flex-direction:column; align-items:center; }
    canvas#clockCanvas { width: min(82vw, 340px); height: min(82vw, 340px); }

    /* Answer block — big text like the number trainer */
    #answerBlock {
      min-height: 6rem;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: .2rem; margin: .5rem 0 .25rem;
    }
    #phrase {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(2.2rem, 1.5rem + 4vw, 4rem);
      line-height: 1.2; color: var(--fg);
      opacity: 0; transform: translateY(4px);
      transition: opacity .25s ease, transform .25s ease;
    }
    #phrase.show { opacity: 1; transform: translateY(0); }
    #formal {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.15rem; font-weight: 500; letter-spacing: .04em;
      color: var(--accent); opacity: 0; transition: opacity .25s ease .06s;
    }
    #formal.show { opacity: 1; }
    #timer {
      font-family: 'JetBrains Mono', monospace; font-size: .95rem;
      color: var(--fg-dim); transition: color .15s; margin-top: .1rem;
    }
    #timer.fast { color: var(--accent); }

    /* Sun / Moon icon — between answer and button */
    #bodyWrap {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 72px;
      margin: .25rem auto .15rem;
      opacity: 0;
      transition: opacity .4s ease;
    }
    #bodyWrap.visible { opacity: 1; }
    canvas#bodyCanvas {
      width: 72px;
      height: 72px;
    }

    /* Button */
    #tapBtn {
      display: flex; align-items: center; justify-content: center; gap: .45rem;
      width: 100%; max-width: 300px; margin: .5rem auto;
      padding: .8rem 1rem;
      font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 500;
      color: var(--bg); background: var(--accent); border: none; border-radius: 12px;
      cursor: pointer; -webkit-user-select: none; user-select: none;
      transition: transform .08s, opacity .08s;
    }
    #tapBtn:active { transform: scale(.97); opacity: .85; }
    #tapBtn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Controls */
    #controls {
      display: flex; flex-wrap: wrap; gap: .35rem; justify-content: center;
      margin: .35rem auto .75rem; max-width: 440px;
    }
    .btn {
      font-family: 'DM Sans', sans-serif; font-size: .78rem; font-weight: 500;
      padding: .4rem .65rem; border-radius: 10px;
      border: 1px solid var(--card-border); background: var(--card);
      color: var(--fg-dim); cursor: pointer; transition: all .15s;
      -webkit-user-select: none; user-select: none;
    }
    .btn:active { transform: translateY(1px); }
    .btn.active { background: var(--accent-soft); color: var(--accent); border-color: rgba(200,149,108,.3); }
    .btn.ghost { border-color: transparent; background: transparent; }

    .stats-bar {
      display: flex; justify-content: center; gap: 1.25rem; flex-wrap: wrap;
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--radius); padding: .6rem 1rem;
      max-width: 440px; margin: 0 auto;
    }
    .stat-item { display: flex; flex-direction: column; align-items: center; gap: .05rem; }
    .stat-val { font-family: 'JetBrains Mono', monospace; font-size: .85rem; font-weight: 500; color: var(--fg); }
    .stat-label { font-size: .65rem; color: var(--fg-dim); text-transform: uppercase; letter-spacing: .06em; }
    .divider { width: 40px; height: 1px; background: var(--card-border); margin: 1rem auto; }
  </style>
</head>
<body>
  <header>
    <h1>Che ora è?</h1>
    <p class="hint">
      <span class="hint-mobile">Tap to reveal, tap again for next</span>
      <span class="hint-desktop"><b>Space</b> reveal / next · <b>Enter</b> advance</span>
    </p>
  </header>

  <div id="clockWrap">
    <canvas id="clockCanvas" width="680" height="680"></canvas>
  </div>

  <div id="answerBlock">
    <div id="phrase">—</div>
    <div id="formal">—</div>
    <!-- Watch-style sun/moon — above the timer -->
    <div id="bodyWrap">
      <canvas id="bodyCanvas" width="144" height="144"></canvas>
    </div>
    <div id="timer">0.000 s</div>
  </div>

  <button id="tapBtn" onclick="handleTap()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    <span id="tapLabel">Cominciamo</span>
  </button>

  <div id="controls">
    <button class="btn active" id="step5" onclick="setStep(5)">5‑min</button>
    <button class="btn" id="step1" onclick="setStep(1)">1‑min</button>
    <button class="btn active" id="meno35" onclick="toggleMeno()">meno ≥ 35</button>
    <button class="btn active" id="diPeriod" onclick="toggleDiPeriod()">di mattina…</button>
    <button class="btn ghost" onclick="clearStats()">Azzera</button>
    <button class="btn ghost" onclick="downloadCSV()">CSV ↓</button>
  </div>

  <div class="divider"></div>

  <div class="stats-bar">
    <div class="stat-item"><span class="stat-val" id="count">0</span><span class="stat-label">Trials</span></div>
    <div class="stat-item"><span class="stat-val" id="avg">—</span><span class="stat-label">Avg</span></div>
    <div class="stat-item"><span class="stat-val" id="best">—</span><span class="stat-label">Best</span></div>
    <div class="stat-item"><span class="stat-val" id="p95">—</span><span class="stat-label">P95</span></div>
  </div>

<script>
const clock      = document.getElementById('clockCanvas');
const bodyCanvas = document.getElementById('bodyCanvas');
const bodyWrap   = document.getElementById('bodyWrap');
let fontsReady   = false;

document.fonts.ready.then(() => { fontsReady = true; drawClock(hour, minute); });

function fixCanvas(cv) {
  const dpr  = window.devicePixelRatio || 1;
  const rect = cv.getBoundingClientRect();
  const nW   = Math.round(rect.width  * dpr);
  const nH   = Math.round(rect.height * dpr);
  if (cv.width !== nW || cv.height !== nH) { cv.width = nW; cv.height = nH; }
  const g = cv.getContext('2d');
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
  return g;
}

/* ════════════════════════════════════════════════════
   WATCH-STYLE SUN / MOON ICON
   Small square canvas, no background, pure icon.
   Sun 06:00–17:59  ·  Moon 18:00–05:59
   ════════════════════════════════════════════════════ */

function drawBodyIcon(h24) {
  const g  = fixCanvas(bodyCanvas);
  const S  = bodyCanvas.clientWidth;
  if (!S) return;
  const cx = S / 2, cy = S / 2;
  g.clearRect(0, 0, S, S);

  const isSun = (h24 >= 6 && h24 < 18);

  if (isSun) {
    /* SUN — matches Panerai Luminor Perpetual Calendar reference photo:
       10 pointed triangular rays. Rays at 12 and 6 o'clock are shortest.
       Rays at 3 and 9 are longest. Smooth gradient from short→long→short
       going around. All tips are sharp points. Solid flat yellow disc. */
    const R  = S * 0.20;  // smaller disc — about 40% of total sun diameter
    const N  = 10;

    const rayBase = R * 1.18;  // rays start just outside disc with a small gap
    const rayMin  = R * 1.55;  // short rays (top/bottom)
    const rayMax  = R * 2.40;  // long rays (left/right) — prominent like the photo
    const baseHW  = R * 0.22;  // half-width at ray base

    // Draw rays behind disc
    for (let i = 0; i < N; i++) {
      // i=0 at top (12 o'clock), going clockwise
      const ang = (Math.PI * 2 * i / N) + Math.PI / 2;

      // Length envelope: sin² gives 0 at top/bottom, 1 at sides
      // ang=-π/2 is top, ang=π/2 is bottom → sin(ang+π/2)=cos(ang)
      // We want short at top AND bottom → use sin²(ang) which is 0 at top(−π/2) and bottom(π/2)
      const t = Math.cos(ang) ** 2;  // 0 at top & bottom (short), 1 at left & right (long)
      const rayTip = rayMin + (rayMax - rayMin) * t;

      // Pointed triangle: two base points on disc edge, one sharp tip
      const perpAng = ang + Math.PI / 2;
      const bx1 = cx + rayBase * Math.cos(ang) + baseHW * Math.cos(perpAng);
      const by1 = cy + rayBase * Math.sin(ang) + baseHW * Math.sin(perpAng);
      const bx2 = cx + rayBase * Math.cos(ang) - baseHW * Math.cos(perpAng);
      const by2 = cy + rayBase * Math.sin(ang) - baseHW * Math.sin(perpAng);
      const tx  = cx + rayTip * Math.cos(ang);
      const ty  = cy + rayTip * Math.sin(ang);

      g.beginPath();
      g.moveTo(bx1, by1);
      g.lineTo(tx, ty);
      g.lineTo(bx2, by2);
      g.closePath();
      g.fillStyle = '#c8a000';
      g.fill();
    }

    // Disc — flat solid yellow matching the matte photo colour
    g.fillStyle = '#e2b400';
    g.beginPath(); g.arc(cx, cy, R, 0, Math.PI * 2); g.fill();

    // Subtle edge shading for roundness
    const rim = g.createRadialGradient(cx, cy, R * 0.65, cx, cy, R);
    rim.addColorStop(0, 'rgba(0,0,0,0)');
    rim.addColorStop(1, 'rgba(0,0,0,.20)');
    g.fillStyle = rim;
    g.beginPath(); g.arc(cx, cy, R, 0, Math.PI * 2); g.fill();

  } else {
    /* MOON — crescent formed by punching an offset disc out of the full disc.
       Panerai GMT moonphase style, lume palette. */
    const R = S * 0.29;

    // Glow
    const glow = g.createRadialGradient(cx, cy, R*.5, cx, cy, R*1.55);
    glow.addColorStop(0, 'rgba(180,190,210,.15)');
    glow.addColorStop(1, 'rgba(160,175,210,0)');
    g.fillStyle = glow;
    g.beginPath(); g.arc(cx, cy, R * 1.55, 0, Math.PI * 2); g.fill();

    // Lit disc
    const moonGrad = g.createRadialGradient(cx - R*.15, cy - R*.18, R*.06, cx, cy, R);
    moonGrad.addColorStop(0, '#e2dcd0');
    moonGrad.addColorStop(0.55, '#bdb49e');
    moonGrad.addColorStop(1, '#7e7668');
    g.fillStyle = moonGrad;
    g.beginPath(); g.arc(cx, cy, R, 0, Math.PI * 2); g.fill();

    // Punch crescent shadow using destination-out
    g.save();
    g.globalCompositeOperation = 'destination-out';
    g.fillStyle = 'rgba(0,0,0,1)';
    g.beginPath();
    g.arc(cx + R * 0.44, cy - R * 0.04, R * 0.89, 0, Math.PI * 2);
    g.fill();
    g.restore();

    // Craters (lit area only — left/upper-left of disc)
    const craters = [
      { ox: -0.28, oy: -0.20, r: 0.10 },
      { ox: -0.10, oy:  0.24, r: 0.07 },
      { ox: -0.38, oy:  0.16, r: 0.065 },
      { ox: -0.20, oy:  0.06, r: 0.048 },
    ];
    for (const cr of craters) {
      const crx = cx + R * cr.ox;
      const cry = cy + R * cr.oy;
      const crR = R * cr.r;
      g.fillStyle = 'rgba(0,0,0,.13)';
      g.beginPath(); g.arc(crx, cry, crR, 0, Math.PI * 2); g.fill();
      g.fillStyle = 'rgba(255,255,255,.09)';
      g.beginPath(); g.arc(crx - crR*.22, cry - crR*.22, crR*.62, 0, Math.PI * 2); g.fill();
    }

    // Highlight on upper horn
    g.fillStyle = 'rgba(255,255,248,.18)';
    g.beginPath(); g.arc(cx - R*.30, cy - R*.28, R*.27, 0, Math.PI * 2); g.fill();
  }
}

/* ════════════════════════════════════════════════════
   PANERAI CLOCK  (unchanged from original)
   ════════════════════════════════════════════════════ */

const DIAL      = '#0a0a0a';
const STEEL_L   = '#9a8878';
const STEEL     = '#6e5e50';
const STEEL_D   = '#3e3028';
const EDGE      = '#28201a';
const LUME      = '#e8dcc8';
const DIAL_WHITE = '#d4d0c8';

function cushionPath(g, cx, cy, r) {
  const k = r * 0.72;
  g.beginPath();
  g.moveTo(cx, cy - r);
  g.bezierCurveTo(cx+k, cy-r, cx+r, cy-k, cx+r, cy);
  g.bezierCurveTo(cx+r, cy+k, cx+k, cy+r, cx, cy+r);
  g.bezierCurveTo(cx-k, cy+r, cx-r, cy+k, cx-r, cy);
  g.bezierCurveTo(cx-r, cy-k, cx-k, cy-r, cx, cy-r);
  g.closePath();
}

function drawClock(h, m) {
  const g  = fixCanvas(clock);
  const w  = clock.clientWidth, ht = clock.clientHeight;
  const cx = w/2, cy = ht/2;
  const outerR = Math.min(w,ht)/2 - 4;
  const dialR  = outerR * 0.82;
  g.clearRect(0, 0, w, ht);

  // Crown guard
  const crCx = cx + outerR*.97, crCy = cy, crW = outerR*.12, crH = outerR*.16;
  g.fillStyle = STEEL;
  g.beginPath();
  g.moveTo(cx+outerR*.78, crCy-crH*2.0);
  g.quadraticCurveTo(cx+outerR*.92, crCy-crH*1.6, crCx+crW*.2, crCy-crH*.85);
  g.lineTo(crCx+crW*.2, crCy+crH*.85);
  g.quadraticCurveTo(cx+outerR*.92, crCy+crH*1.6, cx+outerR*.78, crCy+crH*2.0);
  g.closePath(); g.fill();
  g.strokeStyle = EDGE; g.lineWidth = 1; g.stroke();
  const cbX=crCx-crW*.15, cbY=crCy-crH*.65, cbW=crW, cbH=crH*1.3;
  g.fillStyle=STEEL_L; g.beginPath(); g.roundRect(cbX,cbY,cbW,cbH,2); g.fill();
  g.strokeStyle=STEEL_D; g.lineWidth=0.7; g.stroke();
  g.strokeStyle='rgba(0,0,0,.22)'; g.lineWidth=0.5;
  for(let i=0;i<6;i++){const ly=cbY+2+(cbH-4)*(i/5);g.beginPath();g.moveTo(cbX+1,ly);g.lineTo(cbX+cbW-1,ly);g.stroke();}
  g.fillStyle=STEEL; g.beginPath(); g.arc(cx+outerR*.85,crCy-crH*1.8,crW*.35,Math.PI,0); g.fill();
  g.strokeStyle=EDGE; g.lineWidth=0.7; g.stroke();

  // Case
  cushionPath(g,cx,cy,outerR);
  const bGrad=g.createRadialGradient(cx-outerR*.3,cy-outerR*.3,0,cx,cy,outerR);
  bGrad.addColorStop(0,STEEL_L);bGrad.addColorStop(.5,STEEL);bGrad.addColorStop(1,STEEL_D);
  g.fillStyle=bGrad;g.fill();
  cushionPath(g,cx,cy,outerR);g.strokeStyle=EDGE;g.lineWidth=1.5;g.stroke();
  cushionPath(g,cx,cy,outerR*.91);
  const iGrad=g.createRadialGradient(cx,cy-outerR*.2,0,cx,cy,outerR*.91);
  iGrad.addColorStop(0,'#7a7a78');iGrad.addColorStop(1,STEEL_D);
  g.fillStyle=iGrad;g.fill();
  cushionPath(g,cx,cy,outerR*.91);g.strokeStyle='rgba(0,0,0,.3)';g.lineWidth=0.5;g.stroke();

  // Dial
  g.save();g.beginPath();g.arc(cx,cy,dialR,0,Math.PI*2);g.clip();
  g.fillStyle=DIAL;g.fillRect(0,0,w,ht);
  const dGrad=g.createRadialGradient(cx,cy,0,cx,cy,dialR);
  dGrad.addColorStop(0,'rgba(25,23,20,.25)');dGrad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=dGrad;g.fillRect(0,0,w,ht);
  const trackR=dialR*.94;
  for(let i=0;i<60;i++){if(i%5===0)continue;const a=(Math.PI*2)*(i/60)-Math.PI/2;g.fillStyle='rgba(232,220,200,.15)';g.beginPath();g.arc(cx+trackR*Math.cos(a),cy+trackR*Math.sin(a),.7,0,Math.PI*2);g.fill();}

  g.save();g.fillStyle=DIAL_WHITE;g.shadowColor='rgba(212,208,200,.06)';g.shadowBlur=2;
  g.font=`600 ${dialR*.075}px 'DM Sans',sans-serif`;g.textAlign='center';g.textBaseline='middle';
  g.letterSpacing=`${dialR*.025}px`;g.fillText('LUMINOR',cx,cy-dialR*.42);g.restore();

  g.save();g.fillStyle=DIAL_WHITE;g.shadowColor='rgba(212,208,200,.06)';g.shadowBlur=2;
  g.font=`600 ${dialR*.075}px 'DM Sans',sans-serif`;g.textAlign='center';g.textBaseline='middle';
  g.letterSpacing=`${dialR*.025}px`;g.fillText('PANERAI',cx,cy+dialR*.30);g.restore();

  g.save();g.fillStyle=DIAL_WHITE;g.font=`700 ${dialR*.045}px 'DM Sans',sans-serif`;
  g.textAlign='center';g.textBaseline='middle';g.fillText('OP',cx,cy+dialR*.40);
  const opW=g.measureText('OP').width+4,opH=dialR*.045+2;
  g.strokeStyle=DIAL_WHITE;g.lineWidth=0.6;g.strokeRect(cx-opW/2,cy+dialR*.40-opH/2,opW,opH);g.restore();

  g.save();g.fillStyle='rgba(212,208,200,.4)';g.font=`400 ${dialR*.032}px 'DM Sans',sans-serif`;
  g.textAlign='center';g.textBaseline='middle';g.letterSpacing=`${dialR*.012}px`;
  g.fillText('SWISS  MADE',cx,cy+dialR*.82);g.restore();

  const idxO=dialR*.90,idxI=dialR*.76,nD=dialR*.70;
  for(let i=0;i<12;i++){
    const ang=(Math.PI*2)*(i/12)-Math.PI/2, num=i===0?12:i;
    if(num===12||num===3||num===6||num===9){
      g.save();g.fillStyle=LUME;g.shadowColor='rgba(232,220,200,.10)';g.shadowBlur=4;
      g.font=`900 ${dialR*.22}px 'Nunito',sans-serif`;g.textAlign='center';g.textBaseline='middle';
      g.fillText(String(num),cx+nD*Math.cos(ang),cy+nD*Math.sin(ang));g.restore();
    } else {
      g.save();g.strokeStyle=LUME;g.shadowColor='rgba(232,220,200,.08)';g.shadowBlur=3;
      g.lineWidth=dialR*.022;g.lineCap='round';g.beginPath();
      g.moveTo(cx+idxI*Math.cos(ang),cy+idxI*Math.sin(ang));
      g.lineTo(cx+idxO*Math.cos(ang),cy+idxO*Math.sin(ang));g.stroke();g.restore();
    }
  }

  const hAng=((h%12)+m/60)*(Math.PI/6)-Math.PI/2;
  drawHand(g,cx,cy,hAng,dialR*.46,dialR*.055,dialR*.025);
  const mAng=m*(Math.PI/30)-Math.PI/2;
  drawHand(g,cx,cy,mAng,dialR*.72,dialR*.04,dialR*.018);

  g.shadowColor='transparent';g.shadowBlur=0;
  g.fillStyle='#333';g.beginPath();g.arc(cx,cy,dialR*.035,0,Math.PI*2);g.fill();
  g.fillStyle=LUME;g.beginPath();g.arc(cx,cy,dialR*.018,0,Math.PI*2);g.fill();
  g.restore();
  g.beginPath();g.arc(cx,cy,dialR,0,Math.PI*2);
  g.strokeStyle='rgba(255,255,255,.06)';g.lineWidth=1.5;g.stroke();
}

function drawHand(g,cx,cy,angle,length,baseW,tipW){
  g.save();g.translate(cx,cy);g.rotate(angle+Math.PI/2);
  const mid=length*.38;
  g.beginPath();g.moveTo(-baseW/2,4);g.lineTo(-baseW*.6,-mid);
  g.lineTo(-tipW/2,-length);g.lineTo(tipW/2,-length);
  g.lineTo(baseW*.6,-mid);g.lineTo(baseW/2,4);g.closePath();
  g.fillStyle=LUME;g.shadowColor='rgba(232,220,200,.08)';g.shadowBlur=4;g.fill();
  g.shadowBlur=0;g.strokeStyle='rgba(0,0,0,.35)';g.lineWidth=0.6;g.stroke();
  g.strokeStyle='rgba(80,75,65,.3)';g.lineWidth=0.5;
  g.beginPath();g.moveTo(0,2);g.lineTo(0,-length+2);g.stroke();g.restore();
}

window.addEventListener('resize',()=>{drawClock(hour,minute);if(running)requestAnimationFrame(()=>drawBodyIcon(hour24));});

/* ════════════════════════════════════════════════════
   TIME PHRASES
   ════════════════════════════════════════════════════ */

const numbers=[
  "zero","uno","due","tre","quattro","cinque","sei","sette","otto","nove","dieci",
  "undici","dodici","tredici","quattordici","quindici","sedici","diciassette","diciotto","diciannove",
  "venti","ventuno","ventidue","ventitré","ventiquattro","venticinque","ventisei","ventisette","ventotto","ventinove",
  "trenta","trentuno","trentadue","trentatré","trentaquattro","trentacinque","trentasei","trentasette","trentotto","trentanove",
  "quaranta","quarantuno","quarantadue","quarantatré","quarantaquattro","quarantasei","quarantasette","quarantotto","quarantanove",
  "cinquanta","cinquantuno","cinquantadue","cinquantatré","cinquantaquattro","cinquantacinque","cinquantasei","cinquantasette","cinquantotto","cinquantanove"
];
function numberToWords(n){return numbers[n];}
function hourWord(h){const h12=h%12||12;return h12===1?"l'una":`le ${numberToWords(h12)}`;}
function getTimePhrase(h,m){
  const h12=h%12||12, nextH=(h12%12)+1;
  const useE=h12===1?"È":"Sono", useENext=nextH===1?"È":"Sono";
  const formal=`${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  if(h===0&&m===0)return{phrase:"È mezzanotte",formal};
  if(h===12&&m===0)return{phrase:"È mezzogiorno",formal};
  if(m===0)return{phrase:`${useE} ${hourWord(h)} in punto`,formal};
  if(m===15)return{phrase:`${useE} ${hourWord(h)} e un quarto`,formal};
  if(m===30)return{phrase:`${useE} ${hourWord(h)} e mezza`,formal};
  if(menoFrom35&&m>=35){
    const to=60-m, nW=nextH===1?"l'una":`le ${numberToWords(nextH)}`;
    if(to===15)return{phrase:`${useENext} ${nW} meno un quarto`,formal};
    return{phrase:`${useENext} ${nW} meno ${numberToWords(to)}`,formal};
  }
  return{phrase:`${useE} ${hourWord(h)} e ${numberToWords(m)}`,formal};
}
function getPeriodLabel(h24){
  if(h24>=0&&h24<6)return'notte';
  if(h24>=6&&h24<12)return'mattina';
  if(h24===12)return'mezzogiorno';
  if(h24>12&&h24<18)return'pomeriggio';
  if(h24>=18&&h24<21)return'sera';
  return'notte';
}
function getDiPeriodSuffix(h24,phrase){
  if(phrase.includes('mezzanotte')||phrase.includes('mezzogiorno'))return'';
  const p=getPeriodLabel(h24);
  if(p==='notte')return' di notte';
  if(p==='mattina')return' di mattina';
  if(p==='pomeriggio')return' del pomeriggio';
  if(p==='sera')return' di sera';
  return'';
}

/* ════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════ */

const phraseEl=document.getElementById('phrase');
const formalEl=document.getElementById('formal');
const timerEl=document.getElementById('timer');
const tapLabel=document.getElementById('tapLabel');

let hour=0,hour24=0,minute=0,startTime=null;
let running=false,revealed=false;
let minuteStep=5,menoFrom35=true,showDiPeriod=true;

function setStep(s){minuteStep=s;document.getElementById('step5').classList.toggle('active',s===5);document.getElementById('step1').classList.toggle('active',s===1);}
function toggleMeno(){menoFrom35=!menoFrom35;document.getElementById('meno35').classList.toggle('active',menoFrom35);}
function toggleDiPeriod(){showDiPeriod=!showDiPeriod;document.getElementById('diPeriod').classList.toggle('active',showDiPeriod);}

function showNewClock(){
  hour24=Math.floor(Math.random()*24);
  hour=hour24%12;
  minute=minuteStep===5?Math.floor(Math.random()*12)*5:Math.floor(Math.random()*60);
  drawClock(hour,minute);
  bodyWrap.classList.add('visible');
  requestAnimationFrame(()=>drawBodyIcon(hour24));
  const{phrase,formal}=getTimePhrase(hour,minute);
  phraseEl.textContent=phrase; formalEl.textContent=formal;
  phraseEl.classList.remove('show'); formalEl.classList.remove('show');
  timerEl.textContent='0.000 s'; timerEl.classList.remove('fast');
  startTime=performance.now(); running=true; revealed=false;
  tapLabel.textContent='Rivela';
}

function revealAnswer(){
  const elapsed=(performance.now()-startTime)/1000;
  timerEl.textContent=`${elapsed.toFixed(3)} s`; timerEl.classList.add('fast');
  const{phrase,formal}=getTimePhrase(hour,minute);
  let dp=phrase;
  if(showDiPeriod)dp+=getDiPeriodSuffix(hour24,phrase);
  phraseEl.textContent=dp; formalEl.textContent=formal;
  phraseEl.classList.add('show'); formalEl.classList.add('show');
  revealed=true; recordTrial(elapsed); tapLabel.textContent='Avanti';
}

function handleTap(){
  if(!running){showNewClock();return;}
  if(!revealed)revealAnswer();else showNewClock();
}

document.addEventListener('keydown',(e)=>{
  if(e.code==='Space'){e.preventDefault();handleTap();}
  else if(e.code==='Enter'&&revealed)showNewClock();
});

/* ════════════════════════════════════════════════════
   STATS
   ════════════════════════════════════════════════════ */

const times=[];
const avgEl=document.getElementById('avg');
const countEl=document.getElementById('count');
const bestEl=document.getElementById('best');
const p95El=document.getElementById('p95');

function recordTrial(s){if(isFinite(s)&&s>0){times.push(s);updateStats();}}
function clearStats(){times.length=0;updateStats();}
function downloadCSV(){
  if(!times.length){alert('Nessun dato.');return;}
  const rows=['trial,time_s'];
  times.forEach((t,i)=>rows.push(`${i+1},${t.toFixed(3)}`));
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='time_trainer.csv';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
function updateStats(){
  const n=times.length;countEl.textContent=n;
  if(!n){avgEl.textContent='—';bestEl.textContent='—';p95El.textContent='—';return;}
  const sum=times.reduce((a,b)=>a+b,0);
  avgEl.textContent=(sum/n).toFixed(2)+'s';
  bestEl.textContent=Math.min(...times).toFixed(2)+'s';
  const sorted=[...times].sort((a,b)=>a-b);
  const idx=Math.max(0,Math.min(n-1,Math.ceil(0.95*n)-1));
  p95El.textContent=sorted[idx].toFixed(2)+'s';
}

window.addEventListener('load',()=>drawClock(0,0));
</script>
